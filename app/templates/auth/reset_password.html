{% extends "base.html" %}
{% block title %}Set New Password — Bay Area Experiences{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow">
        <div class="card-body p-4">
          <h2 class="fw-bold text-center mb-4">Set New Password</h2>
          <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">New Password</label>
              <input type="password" class="form-control" id="password" name="password"
                     required minlength="8" autocomplete="new-password" aria-required="true">
            </div>
            <div class="mb-4">
              <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
              <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                     required autocomplete="new-password" aria-required="true">
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Update Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
