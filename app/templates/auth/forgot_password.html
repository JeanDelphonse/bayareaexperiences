{% extends "base.html" %}
{% block title %}Forgot Password — Bay Area Experiences{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow">
        <div class="card-body p-4">
          <h2 class="fw-bold text-center mb-2">Reset Password</h2>
          <p class="text-center text-muted mb-4">Enter your email and we'll send a reset link.</p>
          <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
              <label for="email" class="form-label fw-semibold">Email address</label>
              <input type="email" class="form-control" id="email" name="email"
                     required autocomplete="email" aria-required="true">
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Send Reset Link</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">&larr; Back to Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
