{% extends 'base.html' %}
{% block title %}Thank You — Bay Area Experiences{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 text-center">
      <div style="font-size:64px; margin-bottom:16px;">&#127881;</div>
      <h1 style="color:#1A3557;font-size:28px;font-weight:500;margin-bottom:12px;">Thank you for your review!</h1>
      <p style="color:#5A6A7A;font-size:16px;line-height:1.7;margin-bottom:32px;">
        Your feedback helps us improve and helps other travellers discover the best Bay Area has to offer.
      </p>
      <a href="{{ url_for('main.experience_detail', slug=experience.slug) }}"
         class="btn btn-warning px-4 py-2 fw-semibold" style="border-radius:9999px;">
        Back to {{ experience.name }}
      </a>
    </div>
  </div>
</div>
{% endblock %}
